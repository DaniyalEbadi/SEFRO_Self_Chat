name: ai_persian_secretary
description: "AI Persian Secretary - Personal AI Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.2

  # Backend
  supabase_flutter: ^2.8.3

  # Local Storage
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # AI / LLM
  http: ^1.2.2

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  avatar_glow: ^3.0.1

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # Calendar
  table_calendar: ^3.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Charts & Analytics
  fl_chart: ^0.70.2

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  package_info_plus: ^8.1.3
  device_info_plus: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
