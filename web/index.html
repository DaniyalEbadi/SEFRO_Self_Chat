<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI Persian Secretary">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AI Persian Secretary">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AI Persian Secretary</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (async () => {
      const cleanupKey = 'flutter_sw_cleanup_done';
      const cleanupDone = (() => {
        try {
          return window.sessionStorage.getItem(cleanupKey) === '1';
        } catch (_) {
          return true;
        }
      })();

      if (!cleanupDone) {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
          }
        }

        try {
          window.sessionStorage.setItem(cleanupKey, '1');
        } catch (_) {}

        const freshUrl = `${window.location.pathname}?nocache=${Date.now()}${window.location.hash}`;
        window.location.replace(freshUrl);
        return;
      }

      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js?nocache=1';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
